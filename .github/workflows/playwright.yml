name: Playwright Tests

permissions:
  contents: write
  pages: write
  id-token: write

# Chỉ chạy thủ công
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Chọn môi trường để chạy test'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    # Dùng GitHub Environment
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
    # Checkout source
    - name: Checkout source
      uses: actions/checkout@v4

    # Setup Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    # Install dependencies
    - name: Install dependencies
      run: npm ci

    # Install Playwright browsers
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # Create .env file from GitHub Secrets
    - name: Create .env file
      env:
        FILE_PATH: env/.env.${{ github.event.inputs.environment || 'dev' }}
      run: |
        mkdir -p env

        echo "ENV_NAME=${{ github.event.inputs.environment || 'dev' }}" > $FILE_PATH
        echo "BASE_URL=${{ secrets.BASE_URL }}" >> $FILE_PATH
        echo "ADMIN_USER=${{ secrets.ADMIN_USER }}" >> $FILE_PATH
        echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> $FILE_PATH

    # Run Playwright tests
    - name: Run Playwright tests
      run: |
        npm run test:${{ github.event.inputs.environment || 'dev' }}
      continue-on-error: true

    # Generate Allure report
    - name: Generate Allure Report
      if: always()
      run: |
        npx allure-commandline generate allure-results --clean -o allure-report

    # Deploy Allure report to GitHub Pages
    - name: Deploy Allure Report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        publish_branch: gh-pages

    # Upload Allure report artifact
    - name: Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report-${{ github.event.inputs.environment || 'dev' }}
        path: allure-report/
        retention-days: 30