name: Playwright Tests

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: [ main, master ]

  pull_request:
    branches: [ main, master ]

  workflow_dispatch:
    inputs:
      environment:
        description: 'Chọn môi trường để chạy test'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Create .env file
      env:
        FILE_PATH: env/.env.${{ github.event.inputs.environment || 'dev' }}
      run: |
        mkdir -p env
        echo "ENV_NAME=${{ github.event.inputs.environment || 'dev' }}" > $FILE_PATH
        echo "BASE_URL=${{ secrets.BASE_URL }}" >> $FILE_PATH
        echo "ADMIN_USER=${{ secrets.ADMIN_USER }}" >> $FILE_PATH
        echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> $FILE_PATH

    - name: Run Playwright tests
      run: |
        npm run test:${{ github.event.inputs.environment || 'dev' }}
      continue-on-error: true

    - name: Generate Allure Report
      if: always()
      run: |
        npx allure generate allure-results --clean -o allure-report

    # Deploy Allure report to GitHub Pages
    - name: Deploy report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        publish_branch: gh-pages

    # Upload artifact backup
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-report
        path: allure-report/
        retention-days: 30